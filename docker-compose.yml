version: '3.8'

services:
  maitri-backend:
    build: .
    container_name: maitri-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - OLLAMA_HOST=http://ollama-service:11434
    depends_on:
      - ollama-service
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  maitri-frontend:
    build: .
    container_name: maitri-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
    depends_on:
      - maitri-backend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0

  ollama-service:
    image: ollama/ollama
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
